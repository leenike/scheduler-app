name: Send Alarms

on:
  schedule:
    - cron: '* * * * *'  # 매 1분마다 실행
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  trigger-alarm:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-alarm function
        run: |
          curl -X POST \
            "https://gentle-speculoos-fe66c3.netlify.app/.netlify/functions/send-alarm" \
            -H "Content-Type: application/json" \
            --max-time 30
