body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',helvetica,arial,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,'MS Gothic','Noto Sans KR',sans-serif;background:#121212;color:#fff;overscroll-behavior:none}

<body>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
<script type="text/babel" data-presets="react,env">

const {useState,useEffect,useRef,useCallback}=React;
const _firedAlarms=new Set(); // 컴포넌트 외부 - 재렌더링에도 유지

const DS={
  bg:"#121212",surface:"#181818",surfaceMid:"#1f1f1f",surfaceHigh:"#252525",
  green:"#1ed760",greenDark:"#1db954",white:"#ffffff",silver:"#b3b3b3",
  border:"#4d4d4d",borderLight:"#7c7c7c",negative:"#f3727f",warning:"#ffa42b",
  info:"#539df5",
  shadowHeavy:"rgba(0,0,0,0.5) 0px 8px 24px",shadowMed:"rgba(0,0,0,0.3) 0px 8px 8px",
  insetBorder:"rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset",
};

const DAYS=["일","월","화","수","목","금","토"];
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const PRIORITIES=[
  {id:"A1",color:"#f3727f",bg:"rgba(243,114,127,0.15)",desc:"최우선"},
  {id:"A2",color:"#ff8fa3",bg:"rgba(255,143,163,0.15)",desc:"긴급"},
  {id:"B1",color:"#ffa42b",bg:"rgba(255,164,43,0.15)",desc:"중요"},
  {id:"B2",color:"#ffc96b",bg:"rgba(255,201,107,0.15)",desc:"보통"},
  {id:"C1",color:"#1ed760",bg:"rgba(30,215,96,0.12)",desc:"낮음"},
  {id:"C2",color:"#76e8a0",bg:"rgba(118,232,160,0.12)",desc:"여유"},
  {id:"D1",color:"#539df5",bg:"rgba(83,157,245,0.12)",desc:"나중에"},
  {id:"D2",color:"#90bff9",bg:"rgba(144,191,249,0.12)",desc:"천천히"},
];
const EV_COLORS=["#539df5","#ffa42b","#1ed760","#a855f7","#f3727f","#ffd700"];
const REPEAT_UNITS=[{v:"none",l:"반복 없음"},{v:"min",l:"분"},{v:"hour",l:"시간"},{v:"day",l:"일"},{v:"week",l:"주"},{v:"month",l:"월"},{v:"year",l:"연"}];

const toDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayStr=()=>toDateStr(new Date());
const nowTime=()=>{const n=new Date();return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;};
const coversDate=(item,ds)=>{
  if(!item.date)return false;
  if(item.allDay&&item.endDate)return ds>=item.date&&ds<=item.endDate;
  if(item.date===ds)return true;
  if(!item.repeat||item.repeat==="none")return false;
  if(ds<item.date)return false;
  const base=new Date(item.date+"T00:00:00");
  const target=new Date(ds+"T00:00:00");
  const val=item.repeatVal||1;
  const diffMs=target-base;
  const diffDays=Math.round(diffMs/(1000*60*60*24));
  if(item.repeat==="min"||item.repeat==="hour") return item.date===ds;
  if(item.repeat==="day") return diffDays%val===0;
  if(item.repeat==="week") return diffDays%(val*7)===0;
  if(item.repeat==="month"){
    const diffMonths=(target.getFullYear()-base.getFullYear())*12+(target.getMonth()-base.getMonth());
    return diffMonths%val===0&&target.getDate()===base.getDate();
  }
  if(item.repeat==="year"){
    const diffYears=target.getFullYear()-base.getFullYear();
    return diffYears%val===0&&target.getMonth()===base.getMonth()&&target.getDate()===base.getDate();
  }
  return false;
};
const getPri=id=>PRIORITIES.find(p=>p.id===id)||PRIORITIES[3];
const isMeeting=t=>/미팅|meeting|회의|mtg|미트|약속/i.test(t||"");
const isPastEvent=item=>{if(!item.date||item.allDay)return false;return new Date(`${item.date}T${item.time||"23:59"}`)<new Date();};

const INIT=[
  {id:1,type:"event",title:"팀 미팅",date:todayStr(),endDate:"",time:"10:00",allDay:false,alarms:[{days:0,hours:1,mins:0,sound:"normal"}],done:false,priority:"",hasMeeting:true,location:"서울시 강남구 테헤란로 123",locationMemo:"3층 회의실 A",memo:""},
  {id:2,type:"todo",title:"주간 보고서 작성",date:"",endDate:"",time:"",allDay:false,alarms:[],done:false,priority:"A1",hasMeeting:false,location:"",locationMemo:"",memo:""},
  {id:3,type:"todo",title:"이메일 답장",date:"",endDate:"",time:"",allDay:false,alarms:[],done:false,priority:"B1",hasMeeting:false,location:"",locationMemo:"",memo:""},
  {id:4,type:"todo",title:"운동 30분",date:"",endDate:"",time:"",allDay:false,alarms:[],done:true,priority:"C1",hasMeeting:false,location:"",locationMemo:"",memo:""},
];
const EMPTY_SCHED=(date="")=>({allDay:false,date,endDate:"",time:date===todayStr()?nowTime():"09:00",alarms:[],repeat:"none",repeatVal:1});
const EMPTY_ALARM=()=>({days:0,hours:0,mins:0,sound:"normal"});

const inputSt={width:"100%",border:"none",borderRadius:8,padding:"10px 12px",fontSize:13,boxSizing:"border-box",outline:"none",background:DS.surfaceMid,color:DS.white,boxShadow:DS.insetBorder};
const selectSt={...inputSt,cursor:"pointer"};
const textareaSt={...inputSt,resize:"none"};
const cardSt={background:DS.surface,borderRadius:12,padding:"16px",marginBottom:12,boxShadow:DS.shadowMed};

const Label=({children})=><div style={{fontSize:11,fontWeight:700,color:DS.silver,marginBottom:6,letterSpacing:"1px",textTransform:"uppercase"}}>{children}</div>;

function AlarmSection({alarms,setAlarms}){
  const upd=(i,patch)=>setAlarms(prev=>{const a=[...prev];a[i]={...a[i],...patch};return a;});
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <Label>🔔 알람 설정</Label>
        {alarms.length<3&&<button onClick={()=>setAlarms(p=>[...p,EMPTY_ALARM()])} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"4px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ 추가</button>}
      </div>
      {alarms.length===0&&<div style={{fontSize:12,color:DS.border,textAlign:"center",padding:"6px 0"}}>알람 없음</div>}
      {alarms.map((a,i)=>(
        <div key={i} style={{background:DS.surfaceHigh,borderRadius:10,padding:"12px",marginBottom:8,boxShadow:DS.insetBorder}}>
          <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:8}}>
            {[{k:"days",l:"일"},{k:"hours",l:"시간"},{k:"mins",l:"분"}].map(f=>(
              <div key={f.k} style={{display:"flex",alignItems:"center",gap:3,flex:1}}>
                <input type="number" min={0} value={a[f.k]||0} onChange={e=>upd(i,{[f.k]:Math.max(0,parseInt(e.target.value)||0)})} style={{...inputSt,padding:"7px 4px",fontSize:14,fontWeight:700,textAlign:"center"}}/>
                <span style={{fontSize:11,color:DS.silver,whiteSpace:"nowrap"}}>{f.l}</span>
              </div>
            ))}
            <span style={{fontSize:11,color:DS.border,whiteSpace:"nowrap",marginLeft:2}}>전</span>
            <button onClick={()=>setAlarms(p=>{const a=[...p];a.splice(i,1);return a;})} style={{background:"none",border:"none",color:DS.border,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{v:"normal",l:"🔔 기본"},{v:"escalate",l:"📢 점점 크게"}].map(s=>(
              <button key={s.v} onClick={()=>upd(i,{sound:s.v})} style={{flex:1,border:`1.5px solid ${a.sound===s.v?DS.green:DS.border}`,borderRadius:9999,padding:"6px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:a.sound===s.v?"rgba(30,215,96,0.15)":"transparent",color:a.sound===s.v?DS.green:DS.silver}}>{s.l}</button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function SchedSub({form,setForm}){
  const setAlarms=fn=>{
    const next=typeof fn==="function"?fn(form.alarms||[]):fn;
    setForm({alarms:next});
  };
  const mode=form._schedMode||"time";
  const setMode=m=>{
    if(m==="time") setForm({_schedMode:"time",allDay:false,endDate:"",time:form.date===todayStr()?nowTime():"09:00"});
    if(m==="allday") setForm({_schedMode:"allday",allDay:true,endDate:"",time:"23:59"});
    if(m==="period") setForm({_schedMode:"period",allDay:true,time:""});
  };
  const curH=(form.time||"09:00").split(":")[0];
  const curM=(form.time||"09:00").split(":")[1]||"00";
  return(
    <div style={{background:DS.surfaceHigh,borderRadius:12,padding:"12px",marginBottom:10}}>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{v:"time",l:"⏰ 시간지정"},{v:"allday",l:"☀️ 종일"},{v:"period",l:"📅 기간"}].map(btn=>(
          <button key={btn.v} onClick={()=>setMode(btn.v)} style={{flex:1,border:`1.5px solid ${mode===btn.v?DS.green:DS.border}`,borderRadius:9999,padding:"8px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:mode===btn.v?"rgba(30,215,96,0.15)":"transparent",color:mode===btn.v?DS.green:DS.silver}}>{btn.l}</button>
        ))}
      </div>
      {mode==="time"&&(
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <Label>날짜</Label>
            <input type="date" value={form.date} onChange={e=>setForm({date:e.target.value})} style={inputSt}/>
          </div>
          <div style={{flex:1}}>
            <Label>시간</Label>
            <div style={{display:"flex",gap:4}}>
              <select value={curH} onChange={e=>setForm({time:`${e.target.value}:${curM}`})} style={selectSt}>
                {Array.from({length:24},(_,h)=>String(h).padStart(2,"0")).map(h=><option key={h} value={h}>{h}시</option>)}
              </select>
              <select value={curM} onChange={e=>setForm({time:`${curH}:${e.target.value}`})} style={selectSt}>
                {Array.from({length:12},(_,i)=>String(i*5).padStart(2,"0")).map(m=><option key={m} value={m}>{m}분</option>)}
              </select>
            </div>
          </div>
        </div>
      )}
      {mode==="allday"&&(
        <div style={{marginBottom:8}}>
          <Label>날짜</Label>
          <input type="date" value={form.date} onChange={e=>setForm({date:e.target.value,time:"23:59"})} style={inputSt}/>
          <div style={{fontSize:11,color:DS.silver,marginTop:6}}>☀️ 해당일 24:00까지 자동 설정돼요</div>
        </div>
      )}
      {mode==="period"&&(
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}><Label>시작 날짜</Label><input type="date" value={form.date} onChange={e=>setForm({date:e.target.value})} style={inputSt}/></div>
          <div style={{flex:1}}><Label>종료 날짜</Label><input type="date" value={form.endDate||""} onChange={e=>setForm({endDate:e.target.value})} style={inputSt}/></div>
        </div>
      )}
      <div style={{marginBottom:10}}>
        <Label>🔁 반복</Label>
        <select value={form.repeat||"none"} onChange={e=>setForm({repeat:e.target.value,repeatVal:1})} style={selectSt}>
          {REPEAT_UNITS.map(u=><option key={u.v} value={u.v}>{u.l}</option>)}
        </select>
      </div>
      <AlarmSection alarms={form.alarms||[]} setAlarms={setAlarms}/>
    </div>
  );
}

function EditModal({item,onSave,onClose}){
  const [form,setForm]=useState({...item,alarms:item.alarms||[],memo:item.memo||""});
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9997,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:DS.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",boxShadow:DS.shadowHeavy}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700,color:DS.white}}>{form.type==="event"?"✏️ 일정 수정":"✏️ 할일 수정"}</div>
          <button onClick={onClose} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:DS.silver,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{marginBottom:12}}><Label>제목</Label><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} style={inputSt}/></div>
        <div style={{marginBottom:12}}><Label>📝 메모</Label><textarea value={form.memo||""} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} placeholder="간단한 메모..." style={{...textareaSt,height:64}}/></div>

        {form.type==="todo"&&(
          <div style={{marginBottom:12}}>
            <Label>우선순위</Label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {PRIORITIES.map(pr=>(
                <button key={pr.id} onClick={()=>setForm(p=>({...p,priority:pr.id}))} style={{border:`1.5px solid ${form.priority===pr.id?pr.color:DS.border}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",background:form.priority===pr.id?pr.bg:DS.surfaceHigh,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:10,height:10,borderRadius:3,background:pr.color}}/><div style={{fontSize:12,fontWeight:700,color:form.priority===pr.id?pr.color:DS.silver}}>{pr.id}</div><div style={{fontSize:10,color:form.priority===pr.id?pr.color:DS.white}}>{pr.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        {form.type==="event"&&<SchedSub form={form} setForm={patch=>setForm(p=>({...p,...patch}))}/>}
        {form.type==="todo"&&(
          <>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:form.date?10:12}}>
              <div onClick={()=>setForm(p=>({...p,date:p.date?"":todayStr(),time:!p.date?nowTime():"",endDate:"",allDay:false,alarms:[]}))} style={{width:42,height:24,borderRadius:9999,background:form.date?DS.green:DS.border,position:"relative",transition:"background 0.2s",cursor:"pointer",flexShrink:0}}>
                <div style={{position:"absolute",top:3,left:form.date?20:3,width:18,height:18,borderRadius:"50%",background:DS.white,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:DS.white}}>📅 일정 & 알람</span>
            </label>
            {form.date&&<SchedSub form={form} setForm={patch=>setForm(p=>({...p,...patch}))}/>}
          </>
        )}
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:form.hasMeeting?10:12}}>
          <div onClick={()=>setForm(p=>({...p,hasMeeting:!p.hasMeeting}))} style={{width:42,height:24,borderRadius:9999,background:form.hasMeeting?DS.green:DS.border,position:"relative",transition:"background 0.2s",cursor:"pointer",flexShrink:0}}>
            <div style={{position:"absolute",top:3,left:form.hasMeeting?20:3,width:18,height:18,borderRadius:"50%",background:DS.white,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
          </div>
          <span style={{fontSize:13,fontWeight:600,color:DS.white}}>📍 미팅·약속 장소</span>
        </label>
        {form.hasMeeting&&(
          <div style={{background:"rgba(83,157,245,0.08)",borderRadius:12,padding:"12px",marginBottom:12,border:"1px solid rgba(83,157,245,0.3)"}}>
            <div style={{fontSize:11,fontWeight:700,color:DS.info,marginBottom:6,letterSpacing:"0.5px"}}>📍 약속 장소</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input value={form.location||""} onChange={e=>setForm(p=>({...p,location:e.target.value}))} placeholder="약속 장소 주소" style={{...inputSt,flex:1}}/>
              <button onClick={()=>searchAddress(addr=>setForm(p=>({...p,location:addr})))} style={{background:"rgba(30,215,96,0.15)",border:"1px solid rgba(30,215,96,0.4)",borderRadius:8,padding:"0 12px",fontSize:12,fontWeight:700,color:DS.green,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🔍 검색</button>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:DS.silver,marginBottom:6,letterSpacing:"0.5px"}}>🏠 출발지</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input value={form.departure||""} onChange={e=>setForm(p=>({...p,departure:e.target.value}))} placeholder="출발하는 곳 주소" style={{...inputSt,flex:1}}/>
              <button onClick={()=>searchAddress(addr=>setForm(p=>({...p,departure:addr})))} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"0 12px",fontSize:12,fontWeight:700,color:DS.silver,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>🔍 검색</button>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:DS.silver,marginBottom:6,letterSpacing:"0.5px"}}>📝 메모</div>
            <textarea value={form.locationMemo||""} onChange={e=>setForm(p=>({...p,locationMemo:e.target.value}))} placeholder="회의실, 주차, 코드 등" style={{...textareaSt,height:56,marginBottom:10}}/>
            <div style={{fontSize:11,fontWeight:700,color:DS.silver,marginBottom:8,letterSpacing:"0.5px"}}>🔔 출발 권장 알람</div>
            <div style={{display:"flex",gap:6}}>
              {[{v:"none",l:"없음"},{v:"5min",l:"5분 전"},{v:"5and10",l:"5분+10분 전"}].map(opt=>(
                <button key={opt.v} onClick={()=>setForm(p=>({...p,departureAlarm:opt.v}))} style={{flex:1,border:`1.5px solid ${(form.departureAlarm||"none")===opt.v?DS.warning:DS.border}`,borderRadius:9999,padding:"7px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:(form.departureAlarm||"none")===opt.v?"rgba(255,164,43,0.15)":"transparent",color:(form.departureAlarm||"none")===opt.v?DS.warning:DS.silver}}>{opt.l}</button>
              ))}
            </div>
          </div>
        )}
        <button onClick={()=>onSave(form)} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px",boxShadow:DS.shadowMed}}>저장</button>
      </div>
    </div>
  );
}

function App(){
  const today=new Date();
  const [items,setItems]=useState(()=>{try{if(window.__rtdbItems)return window.__rtdbItems;const s=localStorage.getItem("scheduler_items_v2");return s?JSON.parse(s):[];}catch(e){return [];}});
  const [view,setView]=useState("dashboard");
  const [calMonth,setCalMonth]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [selectedDay,setSelectedDay]=useState(null);
  const [aiResp,setAiResp]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [chatIn,setChatIn]=useState("");
  const [evForm,setEvForm]=useState({title:"",...EMPTY_SCHED(todayStr()),hasMeeting:false,location:"",locationMemo:"",memo:""});
  const [tdForm,setTdForm]=useState({text:"",priority:"B1",hasSchedule:false,...EMPTY_SCHED(),hasMeeting:false,location:"",locationMemo:"",memo:""});
  const [editModal,setEditModal]=useState(null);
  const [memoOpen,setMemoOpen]=useState(null);
  const [memoText,setMemoText]=useState("");
  const [todoDateOffset,setTodoDateOffset]=useState(0);

                      <button key={opt.v} onClick={()=>setTdForm(p=>({...p,departureAlarm:opt.v}))} style={{flex:1,border:`1.5px solid ${(tdForm.departureAlarm||"none")===opt.v?DS.warning:DS.border}`,borderRadius:9999,padding:"7px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:(tdForm.departureAlarm||"none")===opt.v?"rgba(255,164,43,0.15)":"transparent",color:(tdForm.departureAlarm||"none")===opt.v?DS.warning:DS.silver}}>{opt.l}</button>

  }).then(token => {
    if(token) {
      fetch('/.netlify/functions/save-token', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token })
      }).catch(e => console.log('토큰 저장 오류:', e));
    }
  }).catch(e => console.log('FCM 토큰 오류:', e));

  // 포그라운드 메시지 수신
  messaging.onMessage((payload) => {
    console.log('FCM 메시지 수신:', payload);
    const title = payload.notification?.title || '알람';
    window.dispatchEvent(new CustomEvent("alarm-signal", { detail: { title } }));
  });

  // 알람 신호 전송
  window.__sendAlarmSignal = (title, sound) => {
    alarmRef.set({ title, sound, ts: Date.now() }).catch(e => console.error("알람 신호 오류:", e));
  };

  // 알람 신호 삭제 (끄기)
  window.__clearAlarmSignal = () => {
    alarmRef.remove().catch(e => console.error("알람 신호 삭제 오류:", e));
  };

  // 앱 → Realtime DB 저장
  window.__saveToRTDB = (items, slogan) => {
    itemsRef2.set(items).catch(e => console.error("RTDB items 저장 오류:", e));
    if (slogan !== undefined) {
      sloganRef.set(slogan).catch(e => console.error("RTDB slogan 저장 오류:", e));
    }
  };
</script>
</body>
</html>
