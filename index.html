<script type="text/babel" data-presets="react,env">

const {useState,useEffect,useRef,useCallback}=React;
const _firedAlarms=new Set(); // 컴포넌트 외부 - 재렌더링에도 유지

const DS={
  bg:"#121212",surface:"#181818",surfaceMid:"#1f1f1f",surfaceHigh:"#252525",
  green:"#1ed760",greenDark:"#1db954",white:"#ffffff",silver:"#b3b3b3",
  border:"#4d4d4d",borderLight:"#7c7c7c",negative:"#f3727f",warning:"#ffa42b",
  info:"#539df5",
  shadowHeavy:"rgba(0,0,0,0.5) 0px 8px 24px",shadowMed:"rgba(0,0,0,0.3) 0px 8px 8px",
  insetBorder:"rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset",
};

const DAYS=["일","월","화","수","목","금","토"];
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const PRIORITIES=[
  {id:"A1",color:"#f3727f",bg:"rgba(243,114,127,0.15)",desc:"최우선"},
  {id:"A2",color:"#ff8fa3",bg:"rgba(255,143,163,0.15)",desc:"긴급"},
  {id:"B1",color:"#ffa42b",bg:"rgba(255,164,43,0.15)",desc:"중요"},
  {id:"B2",color:"#ffc96b",bg:"rgba(255,201,107,0.15)",desc:"보통"},
  {id:"C1",color:"#1ed760",bg:"rgba(30,215,96,0.12)",desc:"낮음"},
  {id:"C2",color:"#76e8a0",bg:"rgba(118,232,160,0.12)",desc:"여유"},
  {id:"D1",color:"#539df5",bg:"rgba(83,157,245,0.12)",desc:"나중에"},
  {id:"D2",color:"#90bff9",bg:"rgba(144,191,249,0.12)",desc:"선택"},
];
const EV_COLORS=["#539df5","#ffa42b","#1ed760","#a855f7","#f3727f","#ffd700"];
const REPEAT_UNITS=[{v:"none",l:"반복 없음"},{v:"min",l:"분"},{v:"hour",l:"시간"},{v:"day",l:"일"},{v:"week",l:"주"},{v:"month",l:"월"},{v:"year",l:"연"}];

const toDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayStr=()=>toDateStr(new Date());
const nowTime=()=>{const n=new Date();return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;};
const coversDate=(item,ds)=>{
  if(!item.date)return false;
  if(item.allDay&&item.endDate)return ds>=item.date&&ds<=item.endDate;
  if(item.date===ds)return true;
  if(!item.repeat||item.repeat==="none")return false;
  if(ds<item.date)return false;
  const base=new Date(item.date+"T00:00:00");
  const target=new Date(ds+"T00:00:00");
  const val=item.repeatVal||1;
  const diffMs=target-base;
  const diffDays=Math.round(diffMs/(1000*60*60*24));
  if(item.repeat==="min"||item.repeat==="hour") return item.date===ds;
  if(item.repeat==="day") return diffDays%val===0;
  if(item.repeat==="week") return diffDays%(val*7)===0;
  if(item.repeat==="month"){
    const diffMonths=(target.getFullYear()-base.getFullYear())*12+(target.getMonth()-base.getMonth());
    return diffMonths%val===0&&target.getDate()===base.getDate();
  }
  if(item.repeat==="year"){
    const diffYears=target.getFullYear()-base.getFullYear();
    return diffYears%val===0&&target.getMonth()===base.getMonth()&&target.getDate()===base.getDate();
  }
  return false;
};
const getPri=id=>PRIORITIES.find(p=>p.id===id)||PRIORITIES[3];
const isMeeting=t=>/미팅|meeting|회의|mtg|미트|약속/i.test(t||"");
const isPastEvent=item=>{if(!item.date||item.allDay)return false;return new Date(`${item.date}T${item.time||"23:59"}`)<new Date();};

const INIT=[
  {id:1,type:"event",title:"팀 미팅",date:todayStr(),endDate:"",time:"10:00",allDay:false,alarms:[{days:0,hours:1,mins:0,sound:"normal"}],done:false,priority:"",hasMeeting:true,location:"서울시 강남구 테헤란로 123",locationMemo:"3층 회의실 A",memo:""},
  {id:2,type:"todo",title:"주간 보고서 작성",date:"",endDate:"",time:"",allDay:false,alarms:[],done:false,priority:"A1",hasMeeting:false,location:"",locationMemo:"",memo:""},
  {id:3,type:"todo",title:"이메일 답장",date:"",endDate:"",time:"",allDay:false,alarms:[],done:false,priority:"B1",hasMeeting:false,location:"",locationMemo:"",memo:""},
  {id:4,type:"todo",title:"운동 30분",date:"",endDate:"",time:"",allDay:false,alarms:[],done:true,priority:"C1",hasMeeting:false,location:"",locationMemo:"",memo:""},
];
const EMPTY_SCHED=(date="")=>({allDay:false,date,endDate:"",time:date===todayStr()?nowTime():"09:00",alarms:[],repeat:"none",repeatVal:1});
const EMPTY_ALARM=()=>({days:0,hours:0,mins:0,sound:"normal"});

const inputSt={width:"100%",border:"none",borderRadius:8,padding:"10px 12px",fontSize:13,boxSizing:"border-box",outline:"none",background:DS.surfaceMid,color:DS.white,boxShadow:DS.insetBorder};
const selectSt={...inputSt,cursor:"pointer"};
const textareaSt={...inputSt,resize:"none"};
const cardSt={background:DS.surface,borderRadius:12,padding:"16px",marginBottom:12,boxShadow:DS.shadowMed};

const Label=({children})=><div style={{fontSize:11,fontWeight:700,color:DS.silver,marginBottom:6,letterSpacing:"1px",textTransform:"uppercase"}}>{children}</div>;

function AlarmSection({alarms,setAlarms}){
  const upd=(i,patch)=>setAlarms(prev=>{const a=[...prev];a[i]={...a[i],...patch};return a;});
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <Label>🔔 알람 설정</Label>
        {alarms.length<3&&<button onClick={()=>setAlarms(p=>[...p,EMPTY_ALARM()])} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"4px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ 추가</button>}
      </div>
      {alarms.length===0&&<div style={{fontSize:12,color:DS.border,textAlign:"center",padding:"6px 0"}}>알람 없음</div>}
      {alarms.map((a,i)=>(
        <div key={i} style={{background:DS.surfaceHigh,borderRadius:10,padding:"12px",marginBottom:8,boxShadow:DS.insetBorder}}>
          <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:8}}>
            {[{k:"days",l:"일"},{k:"hours",l:"시간"},{k:"mins",l:"분"}].map(f=>(
              <div key={f.k} style={{display:"flex",alignItems:"center",gap:3,flex:1}}>
                <input type="number" min={0} value={a[f.k]||0} onChange={e=>upd(i,{[f.k]:Math.max(0,parseInt(e.target.value)||0)})} style={{...inputSt,padding:"7px 4px",fontSize:14,fontWeight:700,textAlign:"center"}}/>
                <span style={{fontSize:11,color:DS.silver,whiteSpace:"nowrap"}}>{f.l}</span>
              </div>
            ))}
            <span style={{fontSize:11,color:DS.border,whiteSpace:"nowrap",marginLeft:2}}>전</span>
            <button onClick={()=>setAlarms(p=>{const a=[...p];a.splice(i,1);return a;})} style={{background:"none",border:"none",color:DS.border,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{v:"normal",l:"🔔 기본"},{v:"escalate",l:"📢 점점 크게"}].map(s=>(
              <button key={s.v} onClick={()=>upd(i,{sound:s.v})} style={{flex:1,border:`1.5px solid ${a.sound===s.v?DS.green:DS.border}`,borderRadius:9999,padding:"6px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:a.sound===s.v?"rgba(30,215,96,0.15)":"transparent",color:a.sound===s.v?DS.green:DS.silver}}>{s.l}</button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function SchedSub({form,setForm}){
  const setAlarms=fn=>{
    const next=typeof fn==="function"?fn(form.alarms||[]):fn;
    setForm({alarms:next});
  };
  const mode=form._schedMode||"time";
  const setMode=m=>{
    if(m==="time") setForm({_schedMode:"time",allDay:false,endDate:"",time:form.date===todayStr()?nowTime():"09:00"});
    if(m==="allday") setForm({_schedMode:"allday",allDay:true,endDate:"",time:"23:59"});
    if(m==="period") setForm({_schedMode:"period",allDay:true,time:""});
  };
  const curH=(form.time||"09:00").split(":")[0];
  const curM=(form.time||"09:00").split(":")[1]||"00";
  return(
    <div style={{background:DS.surfaceHigh,borderRadius:12,padding:"12px",marginBottom:10}}>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{v:"time",l:"⏰ 시간지정"},{v:"allday",l:"☀️ 종일"},{v:"period",l:"📅 기간"}].map(btn=>(
          <button key={btn.v} onClick={()=>setMode(btn.v)} style={{flex:1,border:`1.5px solid ${mode===btn.v?DS.green:DS.border}`,borderRadius:9999,padding:"8px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:mode===btn.v?"rgba(30,215,96,0.15)":"transparent",color:mode===btn.v?DS.green:DS.silver}}>{btn.l}</button>
        ))}
      </div>
      {mode==="time"&&(
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <Label>날짜</Label>
            <input type="date" value={form.date} onChange={e=>setForm({date:e.target.value})} style={inputSt}/>
          </div>
          <div style={{flex:1}}>
            <Label>시간</Label>
            <div style={{display:"flex",gap:4}}>
              <select value={curH} onChange={e=>setForm({time:`${e.target.value}:${curM}`})} style={selectSt}>
                {Array.from({length:24},(_,h)=>String(h).padStart(2,"0")).map(h=><option key={h} value={h}>{h}시</option>)}
              </select>
              <select value={curM} onChange={e=>setForm({time:`${curH}:${e.target.value}`})} style={selectSt}>
                {Array.from({length:12},(_,i)=>String(i*5).padStart(2,"0")).map(m=><option key={m} value={m}>{m}분</option>)}
              </select>
            </div>
          </div>
        </div>
      )}
      {mode==="allday"&&(
        <div style={{marginBottom:8}}>
          <Label>날짜</Label>
          <input type="date" value={form.date} onChange={e=>setForm({date:e.target.value,time:"23:59"})} style={inputSt}/>
          <div style={{fontSize:11,color:DS.silver,marginTop:6}}>☀️ 해당일 24:00까지 자동 설정돼요</div>
        </div>
      )}
      {mode==="period"&&(
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}><Label>시작 날짜</Label><input type="date" value={form.date} onChange={e=>setForm({date:e.target.value})} style={inputSt}/></div>
          <div style={{flex:1}}><Label>종료 날짜</Label><input type="date" value={form.endDate||""} onChange={e=>setForm({endDate:e.target.value})} style={inputSt}/></div>
        </div>
      )}
      <div style={{marginBottom:10}}>
        <Label>🔁 반복</Label>
        <select value={form.repeat||"none"} onChange={e=>setForm({repeat:e.target.value,repeatVal:1})} style={selectSt}>
          {REPEAT_UNITS.map(u=><option key={u.v} value={u.v}>{u.l}</option>)}
        </select>
      </div>
      <AlarmSection alarms={form.alarms||[]} setAlarms={setAlarms}/>
    </div>
  );
}

function EditModal({item,onSave,onClose}){
  const [form,setForm]=useState({...item,alarms:item.alarms||[],memo:item.memo||""});
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9997,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:DS.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",boxShadow:DS.shadowHeavy}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700,color:DS.white}}>{form.type==="event"?"✏️ 일정 수정":"✏️ 할일 수정"}</div>
          <button onClick={onClose} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:DS.silver,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{marginBottom:12}}><Label>제목</Label><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} style={inputSt}/></div>
        <div style={{marginBottom:12}}><Label>📝 메모</Label><textarea value={form.memo||""} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} placeholder="간단한 메모..." style={{...textareaSt,height:64}}/></div>
        {form.type==="todo"&&(
          <div style={{marginBottom:12}}>
            <Label>우선순위</Label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {PRIORITIES.map(pr=>(
                <button key={pr.id} onClick={()=>setForm(p=>({...p,priority:pr.id}))} style={{border:`1.5px solid ${form.priority===pr.id?pr.color:DS.border}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",background:form.priority===pr.id?pr.bg:DS.surfaceHigh,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:10,height:10,borderRadius:3,background:pr.color}}/><div style={{fontSize:12,fontWeight:700,color:form.priority===pr.id?pr.color:DS.silver}}>{pr.id}</div><div style={{fontSize:10,color:form.priority===pr.id?pr.color:DS.border}}>{pr.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        {form.type==="event"&&<SchedSub form={form} setForm={patch=>setForm(p=>({...p,...patch}))}/>}
        {form.type==="todo"&&(
          <>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:form.date?10:12}}>
              <div onClick={()=>setForm(p=>({...p,date:p.date?"":todayStr(),time:!p.date?nowTime():"",endDate:"",allDay:false,alarms:[]}))} style={{width:42,height:24,borderRadius:9999,background:form.date?DS.green:DS.border,position:"relative",transition:"background 0.2s",cursor:"pointer",flexShrink:0}}>
                <div style={{position:"absolute",top:3,left:form.date?20:3,width:18,height:18,borderRadius:"50%",background:DS.white,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:DS.white}}>📅 일정 & 알람</span>
            </label>
            {form.date&&<SchedSub form={form} setForm={patch=>setForm(p=>({...p,...patch}))}/>}
          </>
        )}
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:form.hasMeeting?10:12}}>
          <div onClick={()=>setForm(p=>({...p,hasMeeting:!p.hasMeeting}))} style={{width:42,height:24,borderRadius:9999,background:form.hasMeeting?DS.green:DS.border,position:"relative",transition:"background 0.2s",cursor:"pointer",flexShrink:0}}>
            <div style={{position:"absolute",top:3,left:form.hasMeeting?20:3,width:18,height:18,borderRadius:"50%",background:DS.white,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
          </div>
          <span style={{fontSize:13,fontWeight:600,color:DS.white}}>📍 미팅·약속 장소</span>
        </label>
        {form.hasMeeting&&(
          <div style={{background:"rgba(83,157,245,0.08)",borderRadius:12,padding:"12px",marginBottom:12,border:`1px solid rgba(83,157,245,0.3)`}}>
            <input value={form.location||""} onChange={e=>setForm(p=>({...p,location:e.target.value}))} placeholder="주소 또는 링크" style={{...inputSt,marginBottom:8}}/>
            <textarea value={form.locationMemo||""} onChange={e=>setForm(p=>({...p,locationMemo:e.target.value}))} placeholder="메모 (회의실, 주차, 코드 등)" style={{...textareaSt,height:56}}/>
          </div>
        )}
        <button onClick={()=>onSave(form)} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px",boxShadow:DS.shadowMed}}>저장</button>
      </div>
    </div>
  );
}

function App(){
  const today=new Date();
  const [items,setItems]=useState(()=>{try{if(window.__rtdbItems)return window.__rtdbItems;const s=localStorage.getItem("scheduler_items_v2");return s?JSON.parse(s):INIT;}catch(e){return INIT;}});
  const [view,setView]=useState("dashboard");
  const [calMonth,setCalMonth]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [selectedDay,setSelectedDay]=useState(null);
  const [aiResp,setAiResp]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [chatIn,setChatIn]=useState("");
  const [evForm,setEvForm]=useState({title:"",...EMPTY_SCHED(todayStr()),hasMeeting:false,location:"",locationMemo:"",memo:""});
  const [tdForm,setTdForm]=useState({text:"",priority:"B1",hasSchedule:false,...EMPTY_SCHED(),hasMeeting:false,location:"",locationMemo:"",memo:""});
  const [editModal,setEditModal]=useState(null);
  const [memoOpen,setMemoOpen]=useState(null);
  const [memoText,setMemoText]=useState("");
  const [todoDateOffset,setTodoDateOffset]=useState(0);
  const [calExpanded,setCalExpanded]=useState(false);
  const [openPri,setOpenPri]=useState(null);
  const [slogan,setSlogan]=useState(()=>localStorage.getItem("my_slogan")||"오늘도 최선을 다하자!");
  const [sloganEdit,setSloganEdit]=useState(false);
  const [ctxMenu,setCtxMenu]=useState(null);
  const [clipboard,setClipboard]=useState(null);
  const ctxMenuRef=useRef(null);
  const [dragItem,setDragItem]=useState(null);
  const [dragOverDay,setDragOverDay]=useState(null);

  useEffect(()=>{
    try{localStorage.setItem("scheduler_items_v2",JSON.stringify(items));}catch(e){}
    if(window.__saveToRTDB) window.__saveToRTDB(items);
  }, [items]);

  // 앱 로드 시 AI 자동 요약
  const autoSummarized=useRef(false);
  useEffect(()=>{
    const timer=setTimeout(()=>{
      const ds=todayStr();
      const te=itemsRef.current.filter(i=>coversDate(i,ds));
      const pt=itemsRef.current.filter(i=>i.type==="todo"&&!i.done);
      const abCount=pt.filter(t=>t.priority?.startsWith("A")||t.priority?.startsWith("B")).length;
      const lines=[];
      if(te.length>0) lines.push(`• 오늘 일정 ${te.length}개 있음`);
      if(pt.length>0) lines.push(`• 미완료 할일 ${pt.length}개 (긴급·중요 ${abCount}개)`);
      const topTodo=[...pt].sort((a,b)=>(a.priority||"").localeCompare(b.priority||""))[0];

                            <div style={{flex:1,fontSize:16,fontWeight:600,color:DS.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                            {item.date&&<span style={{fontSize:12,color:DS.border,flexShrink:0}}>{item.date.slice(5,7)}/{item.date.slice(8,10)}</span>}
                          </div>
                        );})}
                      </div>
                    )}
                    {/* 오늘 완료한 할일 */}
                    {doneTodos.length>0&&(
                      <div>
                        <div style={{fontSize:12,color:DS.border,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>☑️ 오늘 완료 ({doneTodos.length})</div>
                        {doneTodos.map(item=>(
                          <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,opacity:0.5}}>
                            <div style={{width:20,height:20,borderRadius:5,background:DS.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#000",fontWeight:700,flexShrink:0}}>✓</div>
                            <div style={{flex:1,fontSize:15,color:DS.silver,textDecoration:"line-through",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })()}
              {(aiLoad||aiResp)&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(30,215,96,0.15)"}}>
                <div style={{fontSize:12,color:DS.green,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>🤖 AI 브리핑</div>
                {aiLoad?<div style={{fontSize:15,color:DS.silver}}>⏳ 분석 중…</div>:<div style={{fontSize:15,color:DS.white,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{aiResp}</div>}
              </div>}
            </div>

            {/* 이번주 흐름 */}
            <div style={{...cardSt}}>
              <div style={{fontSize:14,fontWeight:700,color:DS.silver,marginBottom:14,letterSpacing:"1px",textTransform:"uppercase"}}>📆 이번 주 흐름</div>
              <div style={{display:"flex",gap:4}}>
                {Array.from({length:7},(_,i)=>{
                  const startOfWeek=new Date(today);
                  startOfWeek.setDate(today.getDate()-today.getDay()+i);
                  const ds=toDateStr(startOfWeek);
                  const isToday=ds===todayStr();
                  const dayItems=items.filter(item=>coversDate(item,ds)&&!(item.type==="todo"&&item.done));
                  const dow=startOfWeek.getDay();
                  return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <div style={{fontSize:12,color:dow===0?DS.negative:dow===6?DS.info:DS.silver,fontWeight:700}}>{DAYS[dow]}</div>
                      <div style={{fontSize:14,fontWeight:isToday?700:400,color:isToday?"#000":DS.white,background:isToday?DS.green:"transparent",width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{startOfWeek.getDate()}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:2,width:"100%"}}>
                        {dayItems.slice(0,3).map((item,ei)=>{const p2=item.type==="todo"?getPri(item.priority):null;return(<div key={item.id} style={{height:5,borderRadius:2,background:p2?p2.color:EV_COLORS[ei%EV_COLORS.length],opacity:isToday?1:0.6}}/>);})}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 우선순위 현황 */}
            {(()=>{
              const togglePri=id=>setOpenPri(p=>p===id?null:id);
              return(
                <div style={{...cardSt}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                    <div style={{fontSize:14,fontWeight:700,color:DS.silver,letterSpacing:"1px",textTransform:"uppercase"}}>우선순위 현황</div>
                    <button onClick={()=>setView("todo")} style={{background:"rgba(30,215,96,0.12)",border:`1px solid rgba(30,215,96,0.3)`,borderRadius:9999,padding:"5px 14px",fontSize:13,fontWeight:700,color:DS.green,cursor:"pointer"}}>할일 추가 →</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:openPri?14:0}}>
                    {PRIORITIES.map(p=>{
                      const cnt=todos.filter(t=>t.priority===p.id&&!t.done).length;
                      const isOpen=openPri===p.id;
                      return(
                        <button key={p.id} onClick={()=>togglePri(p.id)} style={{background:isOpen?p.bg:DS.surfaceHigh,border:`1.5px solid ${isOpen?p.color:DS.border}`,borderRadius:10,padding:"12px 4px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5,transition:"all 0.15s"}}>
                          <div style={{fontSize:15,fontWeight:700,color:p.color}}>{p.id}</div>
                          <div style={{fontSize:11,color:isOpen?p.color:DS.border,letterSpacing:"0.3px"}}>{p.desc}</div>
                          <div style={{background:cnt>0?p.color:"transparent",border:`1px solid ${cnt>0?p.color:DS.border}`,borderRadius:9999,minWidth:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:cnt>0?"#000":DS.border,paddingInline:6}}>{cnt}</div>
                        </button>
                      );
                    })}
                  </div>
                  {openPri&&(()=>{
                    const p=getPri(openPri);
                    const its=todos.filter(t=>t.priority===openPri&&!t.done);
                    return(
                      <div style={{background:p.bg,border:`1px solid ${p.color}33`,borderRadius:12,padding:"14px 16px"}}>
                        <div style={{fontSize:13,fontWeight:700,color:p.color,letterSpacing:"1px",textTransform:"uppercase",marginBottom:its.length?12:0}}>{p.id} · {p.desc} ({its.length}개)</div>
                        {its.length===0
                          ?<div style={{fontSize:16,color:DS.border,textAlign:"center",padding:"10px 0"}}>✅ 모두 완료!</div>
                          :its.map(t=>(
                            <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                              <button onClick={()=>toggleTodo(t.id)} style={{width:24,height:24,borderRadius:6,border:`2px solid ${p.color}`,background:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontSize:12}}></button>
                              <div style={{flex:1,fontSize:16,fontWeight:600,color:DS.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                              {t.date&&<span style={{fontSize:12,color:DS.border,flexShrink:0}}>{t.date.slice(5,7)}/{t.date.slice(8,10)}</span>}
                              <button onClick={()=>setEditModal(t)} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:DS.border,flexShrink:0}}>✏️</button>
                            </div>
                          ))
                        }
                      </div>
                    );
                  })()}
                </div>
              );
            })()}
          </div>
        )}

        {/* CALENDAR */}
        {view==="calendar"&&(
          <div>
            <div style={{...cardSt,userSelect:"none"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <button onClick={prevMonth} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:16,color:DS.white,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <div style={{fontWeight:700,fontSize:16,color:DS.white}}>{year}년 {MONTHS[month]}</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <button onClick={()=>setCalExpanded(p=>!p)} style={{background:calExpanded?DS.green:DS.surfaceMid,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:calExpanded?"#000":DS.silver,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{calExpanded?"⊟":"⊞"}</button>
                  <button onClick={nextMonth} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:16,color:DS.white,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
                {DAYS.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:17,fontWeight:700,color:i===0?DS.negative:i===6?DS.info:DS.silver,padding:"4px 0"}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px 1px"}}>
                {cells.map((d,i)=>{
                  if(!d)return <div key={i}/>;
                  const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
                  const isSel=d===selectedDay;
                  const dayItems=getDayItems(d);
                  const dow=(firstDay+d-1)%7;
                  const maxShow=calExpanded?7:2;
                  return(
                    <div key={i} onClick={()=>onSelectDay(d)}
                      onDragOver={e=>{e.preventDefault();setDragOverDay(d);}}
                      onDragLeave={()=>setDragOverDay(null)}
                      onDrop={e=>{e.preventDefault();if(dragItem){const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;updateItem(dragItem.id,{date:ds});setDragItem(null);setDragOverDay(null);onSelectDay(d);}}}
                      style={{borderRadius:10,cursor:"pointer",background:dragOverDay===d?"rgba(30,215,96,0.25)":isSel?DS.green:isToday?DS.surfaceMid:"transparent",padding:"6px 2px 5px",minHeight:calExpanded?100:68,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"all 0.2s",overflow:"hidden",minWidth:0,position:"relative",border:isSel?`1.5px solid ${DS.green}`:"1.5px solid transparent"}}>
                      <div style={{fontSize:20,fontWeight:isToday||isSel?700:400,color:isSel?"#000":dow===0?DS.negative:dow===6?DS.info:DS.white,lineHeight:1,marginBottom:3}}>{d}</div>
                      <div style={{width:"100%",display:"flex",flexDirection:"column",gap:1,paddingLeft:1,paddingRight:1,boxSizing:"border-box",minWidth:0}}>
                        {dayItems.slice(0,maxShow).map((item,ei)=>{const p2=item.type==="todo"?getPri(item.priority):null;const bg=isSel?"rgba(0,0,0,0.25)":(p2?p2.color:EV_COLORS[ei%EV_COLORS.length]);return(
                          <div key={item.id} draggable onDragStart={e=>{e.stopPropagation();setDragItem(item);}} onDragEnd={()=>{setDragItem(null);setDragOverDay(null);}}
                            style={{background:bg,borderRadius:3,padding:"1px 2px",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",fontSize:9,fontWeight:700,color:"#fff",lineHeight:1.6,width:"100%",boxSizing:"border-box",display:"block",cursor:"grab"}}>
                            {item.allDay?"☀":item.time?.slice(0,5)} {item.title}
                          </div>
                        );})}
                        {dayItems.length>maxShow&&<div style={{fontSize:9,color:DS.silver,paddingLeft:2}}>+{dayItems.length-maxShow}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 선택 날짜 패널 */}
            {selectedDay&&(()=>{
              const vis=selItems;
              return(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:9990,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={()=>setSelectedDay(null)}>
                  <div style={{background:DS.surface,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"75vh",overflowY:"auto",boxShadow:DS.shadowHeavy,paddingBottom:32}} onClick={e=>e.stopPropagation()}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 20px 0"}}>
                      <div>
                        <div style={{fontSize:22,fontWeight:700,color:DS.white}}>{month+1}월 {selectedDay}일</div>
                        <div style={{fontSize:13,color:DS.silver,marginTop:2}}>{DAYS[(new Date(year,month,selectedDay)).getDay()]}요일 · {vis.length}개 일정</div>
                      </div>
                      <button onClick={()=>setSelectedDay(null)} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:16,color:DS.silver,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                    <div style={{padding:"12px 20px 0"}}>
                      {vis.length===0?<div style={{fontSize:15,color:DS.border,textAlign:"center",padding:"30px 0"}}>🎉 자유의 날!</div>:vis.map(item=><ItemRow key={item.id} item={item}/>)}
                      <button onClick={()=>{setEvForm(p=>({...p,date:selDs}));setSelectedDay(null);}} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"12px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:14,letterSpacing:"0.5px"}}>+ 이 날 일정 추가</button>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Add Event */}
            <div style={{...cardSt}}>
              <div style={{fontSize:13,fontWeight:700,color:DS.white,marginBottom:14}}>+ 일정 추가</div>
              <input value={evForm.title} onChange={e=>setEvForm(p=>({...p,title:e.target.value}))} placeholder="일정 제목을 입력하세요" style={{...inputSt,marginBottom:10,fontSize:15,fontWeight:600}}/>
              <SchedSub form={evForm} setForm={patch=>setEvForm(p=>({...p,...(typeof patch==="function"?patch(p):patch)}))}/>
              <button onClick={addEvent} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px",boxShadow:DS.shadowMed,marginTop:4}}>+ 일정 추가</button>
            </div>
          </div>
        )}

        {/* TODO */}
        {view==="todo"&&(
          <div>
            <div style={{...cardSt}}>
              <div style={{fontSize:13,fontWeight:700,color:DS.white,marginBottom:14}}>새 할일 추가</div>
              <input value={tdForm.text} onChange={e=>setTdForm(p=>({...p,text:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTodo()} placeholder="할일 내용 입력..." style={{...inputSt,marginBottom:10,fontSize:14}}/>
              <textarea value={tdForm.memo||""} onChange={e=>setTdForm(p=>({...p,memo:e.target.value}))} placeholder="📝 메모 (선택)" style={{...textareaSt,height:52,marginBottom:12}}/>
              <Label>우선순위</Label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
                {PRIORITIES.map(p=>(<button key={p.id} onClick={()=>setTdForm(prev=>({...prev,priority:p.id}))} style={{border:`1.5px solid ${tdForm.priority===p.id?p.color:DS.border}`,borderRadius:12,padding:"10px 6px",cursor:"pointer",background:tdForm.priority===p.id?p.bg:DS.surfaceHigh,display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.15s"}}><div style={{width:12,height:12,borderRadius:4,background:p.color}}/><div style={{fontSize:13,fontWeight:700,color:tdForm.priority===p.id?p.color:DS.silver}}>{p.id}</div><div style={{fontSize:10,color:tdForm.priority===p.id?p.color:DS.border}}>{p.desc}</div></button>))}
              </div>
              <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:tdForm.hasSchedule?10:0}}>
                <div onClick={()=>setTdForm(p=>({...p,hasSchedule:!p.hasSchedule,date:!p.hasSchedule?todayStr():"",time:!p.hasSchedule?nowTime():"09:00",endDate:"",allDay:false,alarms:[]}))} style={{width:42,height:24,borderRadius:9999,background:tdForm.hasSchedule?DS.green:DS.border,position:"relative",transition:"background 0.2s",cursor:"pointer",flexShrink:0}}>
                  <div style={{position:"absolute",top:3,left:tdForm.hasSchedule?20:3,width:18,height:18,borderRadius:"50%",background:DS.white,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
                </div>
                <span style={{fontSize:13,fontWeight:600,color:DS.white}}>📅 일정 & 알람 설정</span>
              </label>
              {tdForm.hasSchedule&&<SchedSub form={tdForm} setForm={patch=>setTdForm(p=>({...p,...patch}))}/>}
              <button onClick={addTodo} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px",boxShadow:DS.shadowMed,marginTop:12}}>+ 할일 추가</button>
            </div>

            {/* Date navigator */}
            <div style={{...cardSt}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <button onClick={()=>setTodoDateOffset(p=>p-1)} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:DS.white,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:700,color:DS.white}}>{todoViewLabel}</div>
                  <div style={{fontSize:11,color:DS.silver}}>{todoViewDate.getMonth()+1}월 {todoViewDate.getDate()}일 {DAYS[todoViewDate.getDay()]}요일</div>
                </div>
                <button onClick={()=>setTodoDateOffset(p=>p+1)} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:DS.white,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
              </div>
              {(()=>{
                const dt=items.filter(i=>i.type==="todo"&&i.date===todoViewDs&&!i.done);
                const de=items.filter(i=>i.type==="event"&&coversDate(i,todoViewDs)&&!isPastEvent(i));
                if(dt.length===0&&de.length===0)return <div style={{fontSize:13,color:DS.border,textAlign:"center",padding:"12px 0"}}>{todoViewLabel} 일정/할일 없음</div>;
                return [...dt,...de].map(item=><ItemRow key={item.id} item={item}/>);
              })()}
              {todoDateOffset!==0&&<button onClick={()=>setTodoDateOffset(0)} style={{background:DS.surfaceMid,border:`1px solid ${DS.border}`,borderRadius:9999,padding:"7px",width:"100%",fontSize:12,color:DS.silver,cursor:"pointer",marginTop:8}}>오늘로 돌아가기</button>}
            </div>

            {/* Priority Groups */}
            {PRIORITIES.map(p=>{const its=todos.filter(t=>t.priority===p.id&&!t.done&&!(t.date&&t.date<todayStr()));if(!its.length)return null;return(
              <div key={p.id} style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"0 4px"}}>
                  <div style={{width:10,height:10,borderRadius:3,background:p.color}}/>
                  <span style={{fontSize:12,fontWeight:700,color:p.color,letterSpacing:"0.5px"}}>{p.id}</span>
                  <span style={{fontSize:11,color:DS.silver}}>{p.desc}</span>
                  <span style={{marginLeft:"auto",fontSize:11,color:DS.silver}}>{its.filter(t=>!t.done).length}/{its.length}</span>
                </div>
                <div style={{background:DS.surface,borderRadius:14,padding:"0 14px",border:`1px solid ${p.color}22`}}>{its.map(t=><ItemRow key={t.id} item={t}/>)}</div>
              </div>
            );})}
            {(()=>{const visibleEvents=eventsAll.filter(ev=>!isPastEvent(ev));return visibleEvents.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"0 4px"}}>
                  <div style={{width:10,height:10,borderRadius:3,background:DS.info}}/>
                  <span style={{fontSize:12,fontWeight:700,color:DS.info}}>📅 일정</span>
                  <span style={{marginLeft:"auto",fontSize:11,color:DS.silver}}>{visibleEvents.length}개</span>
                </div>
                <div style={{background:DS.surface,borderRadius:14,padding:"0 14px",border:`1px solid rgba(83,157,245,0.2)`}}>{visibleEvents.map(ev=><ItemRow key={ev.id} item={ev}/>)}</div>
              </div>
            );})()}
          </div>
        )}

      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:DS.surface,borderTop:`1px solid rgba(255,255,255,0.08)`,display:"flex",padding:"8px 0 20px",zIndex:100,backdropFilter:"blur(20px)"}}>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setView(n.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
            <div style={{fontSize:21,filter:view===n.id?"none":"grayscale(0.3) opacity(0.5)"}}>{n.icon}</div>
            <div style={{fontSize:10,fontWeight:view===n.id?700:400,color:view===n.id?DS.green:DS.border,letterSpacing:"0.3px"}}>{n.label}</div>
            {view===n.id&&<div style={{width:4,height:4,borderRadius:"50%",background:DS.green}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  const splash=document.getElementById('splash');

    if(document.getElementById('root').children.length>0){
      clearInterval(check);

      setTimeout(()=>splash.remove(),400);

    const data = snap.val();
    if (data) {
      window.__rtdbItems = data;
      window.dispatchEvent(new CustomEvent("rtdb-update", { detail: data }));
    }
  });

  // 앱 → Realtime DB 저장
  window.__saveToRTDB = (items) => {
    ref.set(items).catch(e => console.error("RTDB 저장 오류:", e));
  };
</script>
</body>
</html>
