<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#121212"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="일정관리"/>
<title>내 일정 & 할일</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',helvetica,arial,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,'MS Gothic','Noto Sans KR',sans-serif;background:#121212;color:#fff;overscroll-behavior:none}
#root{min-height:100vh}
input,select,textarea{color-scheme:dark}
select option{background:#1f1f1f;color:#fff}
::-webkit-scrollbar{width:0;background:transparent}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.5}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Spotify Design Tokens ──────────────────────────────
const DS={
  bg:"#121212",
  surface:"#181818",
  surfaceMid:"#1f1f1f",
  surfaceHigh:"#252525",
  green:"#1ed760",
  greenDark:"#1db954",
  white:"#ffffff",
  silver:"#b3b3b3",
  border:"#4d4d4d",
  borderLight:"#7c7c7c",
  negative:"#f3727f",
  warning:"#ffa42b",
  info:"#539df5",
  shadowHeavy:"rgba(0,0,0,0.5) 0px 8px 24px",
  shadowMed:"rgba(0,0,0,0.3) 0px 8px 8px",
  insetBorder:"rgb(18,18,18) 0px 1px 0px, rgb(124,124,124) 0px 0px 0px 1px inset",
};

// ── Priority colors adapted for dark theme ──────────────
const DAYS=["일","월","화","수","목","금","토"];
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const PRIORITIES=[
  {id:"A1",color:"#f3727f",bg:"rgba(243,114,127,0.15)",desc:"최우선"},
  {id:"A2",color:"#ffa42b",bg:"rgba(255,164,43,0.15)",desc:"긴급"},
  {id:"B1",color:"#ffd700",bg:"rgba(255,215,0,0.12)",desc:"중요"},
  {id:"B2",color:"#1ed760",bg:"rgba(30,215,96,0.12)",desc:"보통"},
  {id:"C",color:"#539df5",bg:"rgba(83,157,245,0.12)",desc:"낮음"},
  {id:"D",color:"#b3b3b3",bg:"rgba(179,179,179,0.1)",desc:"여유"},
];
const EV_COLORS=["#539df5","#ffa42b","#1ed760","#a855f7","#f3727f","#ffd700"];
const REPEAT_UNITS=[{v:"none",l:"반복 없음"},{v:"min",l:"분"},{v:"hour",l:"시간"},{v:"day",l:"일"},{v:"week",l:"주"},{v:"month",l:"월"},{v:"year",l:"연"}];

const toDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayStr=()=>toDateStr(new Date());
const nowTime=()=>{const n=new Date();return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;};
const coversDate=(item,ds)=>{if(!item.date)return false;if(item.allDay&&item.endDate)return ds>=item.date&&ds<=item.endDate;return item.date===ds;};
const getPri=id=>PRIORITIES.find(p=>p.id===id)||PRIORITIES[3];
const isMeeting=t=>/미팅|meeting|회의|mtg|미트|약속/i.test(t||"");
const isPastEvent=item=>{if(!item.date||item.allDay)return false;return new Date(`${item.date}T${item.time||"23:59"}`)<new Date();};

const toICSLocal=dt=>{const p=n=>String(n).padStart(2,"0");return `${dt.getFullYear()}${p(dt.getMonth()+1)}${p(dt.getDate())}T${p(dt.getHours())}${p(dt.getMinutes())}00`;};
const TZID="Asia/Seoul";

const exportToCalendar=(item)=>{
  const uid=`${item.id}-${Date.now()}@scheduler`;
  const stamp=toICSLocal(new Date());
  let dtstart,dtend;
  if(item.allDay){
    dtstart=`DTSTART;VALUE=DATE:${item.date.replace(/-/g,"")}`;
    const endDate=item.endDate||item.date;
    const nextDay=new Date(endDate);nextDay.setDate(nextDay.getDate()+1);
    dtend=`DTEND;VALUE=DATE:${toDateStr(nextDay).replace(/-/g,"")}`;
  }else{
    const dt=new Date(item.date+"T"+item.time+":00");
    dtstart=`DTSTART;TZID=${TZID}:${toICSLocal(dt)}`;
    const dtE=new Date(dt.getTime()+60*60*1000);
    dtend=`DTEND;TZID=${TZID}:${toICSLocal(dtE)}`;
  }
  const alarmBlocks=(item.alarms||[]).map(a=>{
    const totalMins=(a.days||0)*1440+(a.hours||0)*60+(a.mins||0);
    const trigger=totalMins===0?"PT0S":`-PT${totalMins}M`;
    return["BEGIN:VALARM","ACTION:DISPLAY",`TRIGGER:${trigger}`,`DESCRIPTION:⏰ ${item.title}`,"END:VALARM"].join("\r\n");
  });
  if(alarmBlocks.length===0)alarmBlocks.push(["BEGIN:VALARM","ACTION:DISPLAY","TRIGGER:-PT15M",`DESCRIPTION:⏰ ${item.title}`,"END:VALARM"].join("\r\n"));
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Scheduler//KR","CALSCALE:GREGORIAN","METHOD:PUBLISH","BEGIN:VTIMEZONE",`TZID:${TZID}`,"BEGIN:STANDARD","DTSTART:19700101T000000","TZOFFSETFROM:+0900","TZOFFSETTO:+0900","TZNAME:KST","END:STANDARD","END:VTIMEZONE","BEGIN:VEVENT",`UID:${uid}`,`DTSTAMP:${stamp}`,dtstart,dtend,`SUMMARY:${item.title}`,item.location?`LOCATION:${item.location.replace(/\n/g,"\\n")}`:"",item.memo?`DESCRIPTION:${item.memo.replace(/\n/g,"\\n")}`:"", ...alarmBlocks,"END:VEVENT","END:VCALENDAR"].filter(Boolean);
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${item.title}.ics`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
};

const INIT=[
  {id:1,type:"event",title:"팀 미팅",date:todayStr(),endDate:"",time:"10:00",allDay:false,alarms:[{days:0,hours:1,mins:0,sound:"normal",repeat:"none",repeatVal:1}],done:false,priority:"",hasMeeting:true,location:"서울시 강남구 테헤란로 123",locationMemo:"3층 회의실 A",memo:""},
  {id:2,type:"todo",title:"주간 보고서 작성",date:"",endDate:"",time:"",allDay:false,alarms:[],done:false,priority:"A1",hasMeeting:false,location:"",locationMemo:"",memo:""},
  {id:3,type:"todo",title:"이메일 답장",date:"",endDate:"",time:"",allDay:false,alarms:[],done:false,priority:"B1",hasMeeting:false,location:"",locationMemo:"",memo:""},
  {id:4,type:"todo",title:"운동 30분",date:"",endDate:"",time:"",allDay:false,alarms:[],done:true,priority:"C",hasMeeting:false,location:"",locationMemo:"",memo:""},
];
const EMPTY_SCHED=(date="")=>({allDay:false,date,endDate:"",time:date===todayStr()?nowTime():"09:00",alarms:[]});
const EMPTY_ALARM=()=>({days:0,hours:0,mins:0,sound:"normal",repeat:"none",repeatVal:1});

// ── Shared input style ────────────────────────────────
const inputSt={width:"100%",border:"none",borderRadius:8,padding:"10px 12px",fontSize:13,boxSizing:"border-box",outline:"none",background:DS.surfaceMid,color:DS.white,boxShadow:DS.insetBorder};
const selectSt={...inputSt,cursor:"pointer"};
const textareaSt={...inputSt,resize:"none"};
const cardSt={background:DS.surface,borderRadius:12,padding:"16px",marginBottom:12,boxShadow:DS.shadowMed};

// ── Pill Button ───────────────────────────────────────
const Pill=({active,onClick,children,green,full,style={}})=>(
  <button onClick={onClick} style={{
    flex:full?undefined:1,width:full?"100%":undefined,
    background:green?DS.green:active?DS.white:DS.surfaceMid,
    color:green?"#000":active?"#000":DS.silver,
    border:"none",borderRadius:9999,
    padding:"10px 16px",fontSize:13,fontWeight:700,
    letterSpacing:"0.5px",cursor:"pointer",
    transition:"all 0.15s",
    boxShadow:active||green?DS.shadowMed:"none",
    ...style
  }}>{children}</button>
);

// ── Section Label ─────────────────────────────────────
const Label=({children})=><div style={{fontSize:11,fontWeight:700,color:DS.silver,marginBottom:6,letterSpacing:"1px",textTransform:"uppercase"}}>{children}</div>;

// ── Alarm Section ─────────────────────────────────────
function AlarmSection({alarms,setAlarms}){
  const [drafts,setDrafts]=useState(()=>alarms.map(a=>({days:String(a.days??0),hours:String(a.hours??0),mins:String(a.mins??0)})));
  useEffect(()=>{setDrafts(alarms.map(a=>({days:String(a.days??0),hours:String(a.hours??0),mins:String(a.mins??0)})));},[alarms.length]);
  const upd=(i,patch)=>setAlarms(prev=>{const a=[...prev];a[i]={...a[i],...patch};return a;});
  const chg=(i,k,raw)=>{if(!/^\d*$/.test(raw))return;setDrafts(prev=>{const d=[...prev];d[i]={...d[i],[k]:raw};return d;});};
  const blur=(i,k,raw)=>{const max={days:99,hours:23,mins:59}[k]??99;const v=Math.max(0,Math.min(max,parseInt(raw)||0));setDrafts(prev=>{const d=[...prev];d[i]={...d[i],[k]:String(v)};return d;});upd(i,{[k]:v});};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <Label>🔔 알람 설정</Label>
        {alarms.length<3&&<button onClick={()=>{setAlarms(p=>[...p,EMPTY_ALARM()]);setDrafts(p=>[...p,{days:"0",hours:"0",mins:"0"}]);}} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"4px 14px",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px"}}>+ 추가</button>}
      </div>
      {alarms.length===0&&<div style={{fontSize:12,color:DS.border,textAlign:"center",padding:"6px 0"}}>알람 없음</div>}
      {alarms.map((a,i)=>(
        <div key={i} style={{background:DS.surfaceHigh,borderRadius:10,padding:"12px",marginBottom:8,boxShadow:DS.insetBorder}}>
          <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:8}}>
            {[{k:"days",l:"일"},{k:"hours",l:"시간"},{k:"mins",l:"분"}].map(f=>(
              <div key={f.k} style={{display:"flex",alignItems:"center",gap:3,flex:1}}>
                <input type="text" inputMode="numeric" value={drafts[i]?.[f.k]??String(a[f.k])} onChange={e=>chg(i,f.k,e.target.value)} onBlur={e=>blur(i,f.k,e.target.value)} style={{...inputSt,padding:"7px 4px",fontSize:14,fontWeight:700,textAlign:"center"}}/>
                <span style={{fontSize:11,color:DS.silver,whiteSpace:"nowrap"}}>{f.l}</span>
              </div>
            ))}
            <span style={{fontSize:11,color:DS.border,whiteSpace:"nowrap",marginLeft:2}}>전</span>
            <button onClick={()=>{setAlarms(p=>{const a=[...p];a.splice(i,1);return a;});setDrafts(p=>{const d=[...p];d.splice(i,1);return d;});}} style={{background:"none",border:"none",color:DS.border,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {[{v:"normal",l:"🔔 기본"},{v:"escalate",l:"📢 점점 크게"}].map(s=>(
              <button key={s.v} onClick={()=>upd(i,{sound:s.v})} style={{flex:1,border:`1.5px solid ${a.sound===s.v?DS.green:DS.border}`,borderRadius:9999,padding:"6px 4px",fontSize:11,fontWeight:700,cursor:"pointer",background:a.sound===s.v?"rgba(30,215,96,0.15)":"transparent",color:a.sound===s.v?DS.green:DS.silver}}>{s.l}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:11,color:DS.silver,whiteSpace:"nowrap"}}>🔁 반복:</span>
            <select value={a.repeat||"none"} onChange={e=>upd(i,{repeat:e.target.value})} style={selectSt}>
              {REPEAT_UNITS.map(u=><option key={u.v} value={u.v}>{u.l}</option>)}
            </select>
            {a.repeat&&a.repeat!=="none"&&(
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                <input type="number" min={1} max={999} value={a.repeatVal||1} onChange={e=>upd(i,{repeatVal:Math.max(1,parseInt(e.target.value)||1)})} style={{...inputSt,width:48,padding:"6px 4px",fontSize:13,fontWeight:700,textAlign:"center"}}/>
                <span style={{fontSize:11,color:DS.silver}}>{REPEAT_UNITS.find(u=>u.v===a.repeat)?.l||""} 마다</span>
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

function SchedForm({val,onChange}){
  const alarms=val.alarms||[];
  const setAlarms=fn=>onChange({alarms:typeof fn==="function"?fn(alarms):fn});
  return(
    <div style={{background:DS.surfaceHigh,borderRadius:12,padding:"12px",marginBottom:10}}>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[{v:false,l:"⏰ 시간 지정"},{v:true,l:"☀️ 종일&기간"}].map(btn=>(
          <button key={btn.l} onClick={()=>onChange({allDay:btn.v,time:(!btn.v&&val.date===todayStr())?nowTime():"09:00"})} style={{flex:1,border:`1.5px solid ${val.allDay===btn.v?DS.green:DS.border}`,borderRadius:9999,padding:"8px",fontSize:12,fontWeight:700,cursor:"pointer",background:val.allDay===btn.v?"rgba(30,215,96,0.15)":"transparent",color:val.allDay===btn.v?DS.green:DS.silver}}>{btn.l}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:1}}>
          <Label>시작 날짜</Label>
          <input type="date" value={val.date} onChange={e=>{const ds=e.target.value;onChange({date:ds,time:!val.allDay?(ds===todayStr()?nowTime():"09:00"):val.time});}} style={inputSt}/>
        </div>
        {!val.allDay&&(
          <div style={{flex:1}}>
            <Label>시간</Label>
            <div style={{display:"flex",gap:4}}>
              <select value={(val.time||"00:00").split(":")[0]} onChange={e=>onChange({time:`${e.target.value}:00`})} style={selectSt}>
                {Array.from({length:24},(_,h)=>String(h).padStart(2,"0")).map(h=><option key={h} value={h}>{h}시</option>)}
              </select>
              {(()=>{
                const nowH=String(new Date().getHours()).padStart(2,"0");
                const nowM=String(new Date().getMinutes()).padStart(2,"0");
                const curH=(val.time||"00:00").split(":")[0];
                const curM=(val.time||"00:00").split(":")[1];
                const isNowHour=curH===nowH;
                const mins=isNowHour?[nowM,...Array.from({length:12},(_,i)=>String(i*5).padStart(2,"0")).filter(m=>m!==nowM)]:Array.from({length:12},(_,i)=>String(i*5).padStart(2,"0"));
                const safeM=mins.includes(curM)?curM:mins[0];
                return(<select value={safeM} onChange={e=>onChange({time:`${curH}:${e.target.value}`})} style={selectSt}>{mins.map(m=><option key={m} value={m}>{m}분{m===nowM&&isNowHour?" ●":""}</option>)}</select>);
              })()}
            </div>
          </div>
        )}
      </div>
      {val.allDay&&<div style={{marginBottom:8}}><Label>종료 날짜</Label><input type="date" value={val.endDate} onChange={e=>onChange({endDate:e.target.value})} style={inputSt}/></div>}
      <AlarmSection alarms={alarms} setAlarms={setAlarms}/>
    </div>
  );
}

function SchedSub({form,setForm}){
  const setAlarms=fn=>setForm(p=>({...p,alarms:typeof fn==="function"?fn(p.alarms):fn}));
  return(
    <div style={{background:DS.surfaceHigh,borderRadius:12,padding:"12px",marginBottom:10}}>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[{v:false,l:"⏰ 시간"},{v:true,l:"☀️ 종일&기간"}].map(btn=>(
          <button key={btn.l} onClick={()=>setForm(p=>({...p,allDay:btn.v,time:!btn.v?(p.date===todayStr()?nowTime():"09:00"):p.time}))} style={{flex:1,border:`1.5px solid ${form.allDay===btn.v?DS.green:DS.border}`,borderRadius:9999,padding:"8px",fontSize:12,fontWeight:700,cursor:"pointer",background:form.allDay===btn.v?"rgba(30,215,96,0.15)":"transparent",color:form.allDay===btn.v?DS.green:DS.silver}}>{btn.l}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{flex:1}}>
          <Label>날짜</Label>
          <input type="date" value={form.date} onChange={e=>{const ds=e.target.value;setForm(p=>({...p,date:ds,time:!p.allDay?(ds===todayStr()?nowTime():"09:00"):p.time}));}} style={inputSt}/>
        </div>
        {!form.allDay&&(
          <div style={{flex:1}}>
            <Label>시간</Label>
            <div style={{display:"flex",gap:4}}>
              <select value={(form.time||"00:00").split(":")[0]} onChange={e=>setForm(p=>({...p,time:`${e.target.value}:00`}))} style={selectSt}>
                {Array.from({length:24},(_,h)=>String(h).padStart(2,"0")).map(h=><option key={h} value={h}>{h}시</option>)}
              </select>
              {(()=>{
                const nowH=String(new Date().getHours()).padStart(2,"0");
                const nowM=String(new Date().getMinutes()).padStart(2,"0");
                const curH=(form.time||"00:00").split(":")[0];
                const curM=(form.time||"00:00").split(":")[1];
                const isNowHour=curH===nowH;
                const mins=isNowHour?[nowM,...Array.from({length:12},(_,i)=>String(i*5).padStart(2,"0")).filter(m=>m!==nowM)]:Array.from({length:12},(_,i)=>String(i*5).padStart(2,"0"));
                const safeM=mins.includes(curM)?curM:mins[0];
                return(<select value={safeM} onChange={e=>setForm(p=>({...p,time:`${curH}:${e.target.value}`}))} style={selectSt}>{mins.map(m=><option key={m} value={m}>{m}분{m===nowM&&isNowHour?" ●":""}</option>)}</select>);
              })()}
            </div>
          </div>
        )}
      </div>
      {form.allDay&&<div style={{marginBottom:8}}><Label>종료 날짜</Label><input type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))} style={inputSt}/></div>}
      <AlarmSection alarms={form.alarms} setAlarms={setAlarms}/>
    </div>
  );
}

function EditModal({item,onSave,onClose}){
  const [form,setForm]=useState({...item,alarms:item.alarms||[],memo:item.memo||""});
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9997,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:DS.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",boxShadow:DS.shadowHeavy}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:700,color:DS.white}}>{form.type==="event"?"✏️ 일정 수정":"✏️ 할일 수정"}</div>
          <button onClick={onClose} style={{background:DS.surfaceMid,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:DS.silver,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{marginBottom:12}}><Label>제목</Label><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value,hasMeeting:isMeeting(e.target.value)?true:p.hasMeeting}))} style={inputSt}/></div>
        <div style={{marginBottom:12}}><Label>📝 메모</Label><textarea value={form.memo||""} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} placeholder="간단한 메모..." style={{...textareaSt,height:64}}/></div>
        {form.type==="todo"&&(
          <div style={{marginBottom:12}}>
            <Label>우선순위</Label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {PRIORITIES.map(pr=>(
                <button key={pr.id} onClick={()=>setForm(p=>({...p,priority:pr.id}))} style={{border:`1.5px solid ${form.priority===pr.id?pr.color:DS.border}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",background:form.priority===pr.id?pr.bg:DS.surfaceHigh,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:10,height:10,borderRadius:3,background:pr.color}}/><div style={{fontSize:12,fontWeight:700,color:form.priority===pr.id?pr.color:DS.silver}}>{pr.id}</div><div style={{fontSize:10,color:form.priority===pr.id?pr.color:DS.border}}>{pr.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        {form.type==="event"&&<SchedSub form={form} setForm={setForm}/>}
        {form.type==="todo"&&(
          <>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:form.date?10:12}}>

        </label>

            <textarea value={form.locationMemo||""} onChange={e=>setForm(p=>({...p,locationMemo:e.target.value}))} placeholder="메모 (회의실, 주차, 코드 등)" style={{...textareaSt,height:56}}/>

        <button onClick={()=>onSave(form)} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px",boxShadow:DS.shadowMed}}>저장</button>

  );
}

  const [tdForm,setTdForm]=useState({text:"",priority:"B1",hasSchedule:false,...EMPTY_SCHED(),hasMeeting:false,location:"",locationMemo:"",memo:""});

  const todoViewDate=new Date(today);todoViewDate.setDate(today.getDate()+todoDateOffset);
  const todoViewDs=toDateStr(todoViewDate);
  const todoViewLabel=todoDateOffset===0?"오늘":todoDateOffset===1?"내일":todoDateOffset===-1?"어제":`${todoViewDate.getMonth()+1}/${todoViewDate.getDate()}`;

  const onSelectDay=d=>{setSelectedDay(d);const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;setEvForm(p=>({...p,...EMPTY_SCHED(ds),title:p.title}));};
  const prevMonth=()=>{setCalMonth(new Date(year,month-1,1));setSelectedDay(1);};
  const nextMonth=()=>{setCalMonth(new Date(year,month+1,1));setSelectedDay(1);};
  const onCalTS=e=>{calTouchX.current=e.touches[0].clientX;};
  const onCalTE=e=>{const dx=e.changedTouches[0].clientX-calTouchX.current;if(dx<-50)nextMonth();else if(dx>50)prevMonth();};
  const onTodoTS=e=>{todoTouchX.current=e.touches[0].clientX;};
  const onTodoTE=e=>{const dx=e.changedTouches[0].clientX-todoTouchX.current;if(dx<-50)setTodoDateOffset(p=>p+1);else if(dx>50)setTodoDateOffset(p=>p-1);};

  const openCtxMenu=(e,item)=>{e.preventDefault();e.stopPropagation();setCtxMenu({item,x:e.clientX,y:e.clientY});};
  const closeCtxMenu=()=>setCtxMenu(null);
  const deleteItem=id=>setItems(p=>p.filter(i=>i.id!==id));
  const ctxDelete=()=>{if(!ctxMenu?.item)return;deleteItem(ctxMenu.item.id);closeCtxMenu();};
  const ctxCut=()=>{if(!ctxMenu?.item)return;setClipboard({item:ctxMenu.item,mode:"cut"});deleteItem(ctxMenu.item.id);closeCtxMenu();};
  const ctxCopy=()=>{if(!ctxMenu?.item)return;setClipboard({item:{...ctxMenu.item},mode:"copy"});closeCtxMenu();};
  const ctxPaste=()=>{if(!clipboard)return;setItems(p=>[...p,{...clipboard.item,id:Date.now(),date:selDs}]);setClipboard(prev=>prev.mode==="cut"?null:{...prev});closeCtxMenu();};
  const ctxDuplicate=()=>{if(!ctxMenu?.item)return;setItems(p=>[...p,{...ctxMenu.item,id:Date.now()}]);closeCtxMenu();};
  const pasteClipboard=useCallback(()=>{if(!clipboard)return;setItems(p=>[...p,{...clipboard.item,id:Date.now(),date:selDs}]);if(clipboard.mode==="cut")setClipboard(null);},[clipboard,selDs]);

  useEffect(()=>{
    const h=e=>{const tag=document.activeElement?.tagName;if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT")return;const ctrl=e.metaKey||e.ctrlKey;if(!ctrl)return;if(e.key==="v"||e.key==="V"){e.preventDefault();pasteClipboard();return;}if(!ctxMenu)return;if(e.key==="x"||e.key==="X"){e.preventDefault();ctxCut();}else if(e.key==="c"||e.key==="C"){e.preventDefault();ctxCopy();}else if(e.key==="d"||e.key==="D"){e.preventDefault();ctxDuplicate();}};
    const dh=e=>{const tag=document.activeElement?.tagName;if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT")return;if((e.key==="Delete"||e.key==="Backspace")&&ctxMenu){e.preventDefault();ctxDelete();}};
    window.addEventListener("keydown",h);window.addEventListener("keydown",dh);
    return()=>{window.removeEventListener("keydown",h);window.removeEventListener("keydown",dh);};
  },[ctxMenu,pasteClipboard]);

  const buildSummary=useCallback(()=>{const ds=todayStr();const te=items.filter(i=>coversDate(i,ds));const pt=items.filter(i=>i.type==="todo"&&!i.done);return `오늘(${today.getMonth()+1}월 ${today.getDate()}일) 일정:\n${te.map(e=>`- ${e.allDay?"종일":e.time} ${e.title}`).join("\n")||"없음"}\n\n미완료 할일:\n${pt.map(t=>`- [${t.priority}] ${t.title}`).join("\n")||"없음"}\n\n핵심만 짧게 요약. '~임','~함' 체. bullet 5줄 이내.`;},[items]);
  const askAI=useCallback(async(prompt)=>{const p=prompt||chatIn||buildSummary();setAiLoad(true);setAiResp("");try{const r=await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"친절한 AI 비서. 일정·할일 분석해 간결한 조언 한국어로 제공.",messages:[{role:"user",content:p}]})});const d=await r.json();setAiResp(d.content?.[0]?.text||"응답 없음");}catch(e){setAiResp("⚠️ AI 연결 오류");}setAiLoad(false);setChatIn("");},[chatIn,buildSummary]);

  const todos=items.filter(i=>i.type==="todo");
  const eventsAll=items.filter(i=>i.type==="event");

                <div style={{fontWeight:700,fontSize:16,color:DS.white}}>{year}년 {MONTHS[month]}</div>

                  <button onClick={()=>setCalExpanded(p=>!p)} style={{background:calExpanded?DS.green:DS.surfaceMid,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:14,color:calExpanded?"#000":DS.silver,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{calExpanded?"⊟":"⊞"}</button>

              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px 1px"}}>

                  return(
                    <div key={i} onClick={()=>onSelectDay(d)}

                      style={{borderRadius:10,cursor:"pointer",background:isSel?DS.green:isToday?DS.surfaceMid:"transparent",padding:"5px 2px 4px",minHeight:calExpanded?100:56,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"background 0.1s"}}>
                      <div style={{fontSize:13,fontWeight:isToday||isSel?700:400,color:isSel?"#000":dow===0?DS.negative:dow===6?DS.info:DS.white,lineHeight:1,marginBottom:2}}>{d}</div>
                      <div style={{width:"100%",display:"flex",flexDirection:"column",gap:1,paddingLeft:1,paddingRight:1,boxSizing:"border-box"}}>
                        {dayItems.slice(0,maxShow).map((item,ei)=>{const p2=item.type==="todo"?getPri(item.priority):null;const bg=isSel?"rgba(0,0,0,0.25)":(p2?p2.color:EV_COLORS[ei%EV_COLORS.length]);return(

              <button onClick={addTodo} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px",boxShadow:DS.shadowMed}}>+ 할일 추가</button>

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

                <div style={{textAlign:"center"}}>

              {(()=>{const dt=items.filter(i=>i.type==="todo"&&i.date===todoViewDs);const de=items.filter(i=>i.type==="event"&&coversDate(i,todoViewDs));if(dt.length===0&&de.length===0)return <div style={{fontSize:13,color:DS.border,textAlign:"center",padding:"12px 0"}}>{todoViewLabel} 일정/할일 없음</div>;return [...dt,...de].map(item=><ItemRow key={item.id} item={item}/>);})()}

                  <span style={{fontSize:12,fontWeight:700,color:p.color,letterSpacing:"0.5px"}}>{p.id}</span>

                  <span style={{marginLeft:"auto",fontSize:11,color:DS.silver}}>{its.filter(t=>!t.done).length}/{its.length}</span>
                </div>
                <div style={{background:DS.surface,borderRadius:14,padding:"0 14px",border:`1px solid ${p.color}22`}}>{its.map(t=><ItemRow key={t.id} item={t}/>)}</div>

            {eventsAll.length>0&&(

          <div>
            <div style={{...cardSt}}>
              <div style={{fontSize:13,color:DS.silver,marginBottom:14,lineHeight:1.6}}>오늘의 일정과 할일을 분석해 조언을 받아보세요</div>
              <button onClick={()=>askAI(buildSummary())} disabled={aiLoad} style={{background:DS.green,color:"#000",border:"none",borderRadius:9999,padding:"14px",width:"100%",fontSize:14,fontWeight:700,cursor:"pointer",opacity:aiLoad?0.5:1,letterSpacing:"0.5px",boxShadow:DS.shadowMed}}>{aiLoad?"⏳ 분석 중...":"🤖 오늘 요약 & 조언 받기"}</button>

            <div style={{...cardSt}}>

}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  let swReg=null;
  navigator.serviceWorker.register('./sw.js').then(reg=>{swReg=reg;scheduleAlarms();}).catch(err=>console.warn('[SW] 등록 실패',err));
  if(Notification.permission==='default'){Notification.requestPermission().then(p=>{if(p==='granted')scheduleAlarms();});}
  function scheduleAlarms(){
    if(!swReg||Notification.permission!=='granted')return;
    let items=[];try{items=JSON.parse(localStorage.getItem('scheduler_items')||'[]');}catch(e){return;}
    const now=Date.now();const alarms=[];
    items.forEach(item=>{
      if(!item.date||!item.alarms||item.alarms.length===0)return;if(item.done)return;
      const timeStr=item.allDay?'09:00':(item.time||'09:00');
      const[h,m]=timeStr.split(':').map(Number);const baseDate=new Date(item.date+'T00:00:00');baseDate.setHours(h,m,0,0);const baseMs=baseDate.getTime();
      item.alarms.forEach((alarm,ai)=>{
        const offsetMins=(alarm.days||0)*1440+(alarm.hours||0)*60+(alarm.mins||0);const fireAt=baseMs-offsetMins*60*1000;if(fireAt<=now)return;
        alarms.push({id:`${item.id}-${ai}`,title:`⏰ ${item.title}`,body:item.allDay?`종일 일정 알람`:`${timeStr} 일정 알람`,fireAt});
      });
    });
    navigator.serviceWorker.ready.then(reg=>{reg.active&&reg.active.postMessage({type:'SCHEDULE_ALARMS',alarms});});
  }
  let lastSnap=localStorage.getItem('scheduler_items');
  setInterval(()=>{const cur=localStorage.getItem('scheduler_items');if(cur!==lastSnap){lastSnap=cur;scheduleAlarms();}},3000);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')scheduleAlarms();});
  window._rescheduleAlarms=scheduleAlarms;
})();
</script>
